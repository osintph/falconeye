# /etc/nginx/sites-available/falconeye.conf
# Phase 1: HTTP-only vhost.
# Phase 2: run deploy/install-tls.sh — certbot --nginx adds the HTTPS server block automatically.

log_format falconeye_telemetry '$time_iso8601 | status=$status | bytes=$body_bytes_sent | rt=$request_time';

server {
    listen 80;
    listen [::]:80;
    server_name falconeye.osintph.info;

    root /opt/falconeye/public;
    index index.html;

    gzip_static on;
    # text/html omitted — nginx compresses it by default; listing it here is redundant
    gzip_types text/css application/json application/rss+xml application/feed+json;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # HSTS added by certbot after TLS is configured

    access_log /var/log/nginx/falconeye_access.log falconeye_telemetry;
    error_log /var/log/nginx/falconeye_error.log warn;

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=60";
    }

    location = /healthz {
        try_files /healthz.json =404;
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    # STIX/TAXII-like static collection endpoints
    location /api/v1/taxii/ {
        try_files $uri $uri/index.json =404;
        default_type application/taxii+json;
        add_header Cache-Control "public, max-age=900, stale-while-revalidate=300";
        add_header Access-Control-Allow-Origin "*";
    }

    # API path reserved for v0.2+ FalconEye-Match sharded indices
    location /api/v1/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=900, stale-while-revalidate=300";
        add_header Access-Control-Allow-Origin "*";
    }
}
