# FalconEye brand watchlist — structured format.
# Each entry: name (canonical), aliases (matched with \b word boundaries),
# require_context (true = short/ambiguous token, needs a PH context term nearby),
# context_terms (checked within 200 chars of the alias match; lowercased).
#
# Rule of thumb:
#   Multi-word or unique names → require_context: false
#   Short abbreviations (BPI, PNB, BIR, DICT, Smart, Globe …) → require_context: true

brands:

  # --- Banks (BSP-supervised universal and commercial banks) ---

  - name: "BDO Unibank"
    aliases: ["BDO Unibank", "BDO", "bdo.com.ph"]
    require_context: false   # "BDO" is PH-specific enough in threat intel context

  - name: "Bank of the Philippine Islands"
    aliases: ["Bank of the Philippine Islands", "BPI", "bpi.com.ph"]
    require_context: true
    context_terms: [".ph", "philippine", "philippines", "manila", "bangko sentral", "bsp"]

  - name: "Metrobank"
    aliases: ["Metrobank", "Metropolitan Bank", "metrobank.com.ph"]
    require_context: false

  - name: "UnionBank"
    aliases: ["UnionBank", "Union Bank of the Philippines", "unionbankph.com"]
    require_context: false

  - name: "Security Bank"
    aliases: ["Security Bank", "securitybank.com"]
    require_context: false

  - name: "RCBC"
    aliases: ["RCBC", "Rizal Commercial Banking", "rcbc.com"]
    require_context: true
    context_terms: [".ph", "philippine", "philippines", "rizal", "banking"]

  - name: "Philippine National Bank"
    aliases: ["Philippine National Bank", "PNB", "pnb.com.ph"]
    require_context: true
    context_terms: [".ph", "philippine", "philippines", "pnb.com"]

  - name: "Land Bank of the Philippines"
