  - name: "PSBank"
    aliases: ["PSBank", "Philippine Savings Bank", "psbank.com.ph"]
    require_context: true
    context_terms: [".ph", "philippine", "philippines", "psbank"]

  - name: "PayMaya"
    aliases: ["PayMaya", "paymaya.com"]
    require_context: false

  - name: "GCash"
    aliases: ["GCash", "gcash.com"]
    require_context: false

