# Tag priority for ASN+tag campaign clustering.
# When an IOC carries multiple URLhaus tags (e.g. mirai, arm, elf, 32-bit),
# the highest-priority level wins; within a level, the alphabetically-first
# matching tag (case-insensitive) is chosen. IOCs whose tags don't match any
# level are excluded from ASN+tag clustering with a WARNING log entry.
# Update when new malware families or significant functional categories appear.

priority_levels:
  - level: family
    tags:
      - mirai
      - mozi
      - gafgyt
      - bashlite
      - trickbot
      - emotet
      - qakbot
      - asyncrat
      - njrat
      - quasar
      - dcrat
      - cobalt_strike
      - metasploit
      - sliver

  - level: functional
    tags:
      - c2
      - dropper
      - phishing
      - webshell
      - exploit
      - ransomware
      - stealer

  - level: architecture
    tags:
      - arm
      - mips
      - mipsel
      - x86
      - x64
      - elf
      - 32-bit
      - 64-bit
      - android
      - windows
      - linux
