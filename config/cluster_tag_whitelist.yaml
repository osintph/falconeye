# Tags allowed as the primary label for ASN+tag campaign clustering.
# Architecture/platform tags (arm, mips, elf, 32-bit, etc.) are excluded by
# design: they describe payload format, not threat identity, and produce
# campaigns with no actionable meaning (e.g. "elf on AS9299").
# Update when a new malware family or functional category reaches sufficient
# prevalence to warrant its own campaign label.

allowed_tags:
  # malware families
  - mirai
  - mozi
  - gafgyt
  - bashlite
  - trickbot
  - emotet
  - qakbot
  - asyncrat
  - njrat
  - quasar
  - dcrat
  - cobalt_strike
  - metasploit
  - sliver

  # functional roles
  - c2
  - dropper
  - phishing
  - webshell
  - exploit
  - ransomware
  - stealer
