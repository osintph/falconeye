server {
    listen 80;
    server_name falconeye.osintph.info;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name falconeye.osintph.info;

    ssl_certificate     /etc/ssl/falconeye/origin.crt;
    ssl_certificate_key /etc/ssl/falconeye/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 108.162.192.0/18;
    allow 131.0.72.0/22;
    allow 141.101.64.0/18;
    allow 162.158.0.0/15;
    allow 172.64.0.0/13;
    allow 173.245.48.0/20;
    allow 188.114.96.0/20;
    allow 190.93.240.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    deny all;

    client_max_body_size 2M;

    # Security response headers.
    # Note: script-src retains 'unsafe-inline' because the frontend uses inline onclick
    # handlers. Removing it requires refactoring those to addEventListener bindings first.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /favicon.ico {
        alias /opt/falconeye/app_src/app/static/favicon-32x32.png;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /favicon.svg {
        alias /opt/falconeye/app_src/app/static/favicon.svg;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /static/ {
        alias /opt/falconeye/app_src/app/static/;
        expires 1h;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
